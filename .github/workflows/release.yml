name: Release

# Publishes @holotope/core and @holotope/three to npm when a v* tag is
# pushed (or manually via workflow_dispatch). Authenticates through npm
# trusted publishing (OIDC): no token is stored in the repository —
# npmjs.com lists this repo + workflow as a trusted publisher for each
# package.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm vitest run

      - name: Publish
        # pnpm rewrites workspace:* to real versions; --no-git-checks
        # because tag builds check out a detached HEAD.
        run: pnpm publish -r --no-git-checks
